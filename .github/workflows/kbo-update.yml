name: KBO Data Auto Update - record

on:
  schedule:
    # 매일 한국 시간 자정(00:00)에 실행 (UTC 15:00)
    - cron: '0 15 * * *'
  workflow_dispatch: # 수동 실행 버튼

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      # 💡 수정된 부분: 확실하게 크롤링 필수 라이브러리 2개를 설치하라고 명령합니다!
      - name: Install dependencies
        run: |
          npm install
          npm install playwright @supabase/supabase-js

      - name: Install Playwright Browsers
        run: npx playwright install chromium

      # 1. 일정 및 경기 결과 업데이트
      - name: Run Scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: node scripts/scraper.mjs

      # 2. 팀/개인 기록 업데이트 (월요일 제외 실행)
      - name: Run Record Scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          DAY=$(date +%u)
          if [ "$DAY" -ne 1 ]; then
            node scripts/record-scraper.mjs
          else
            echo "오늘은 월요일이라 기록 업데이트를 건너뜁니다."
          fi