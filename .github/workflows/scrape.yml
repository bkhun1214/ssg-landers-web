name: KBO Data Auto Update

on:
  schedule:
    # 매일 한국 시간 자정(00:00)에 실행 (UTC 15:00)
    - cron: '0 15 * * *'
  workflow_dispatch: 

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: 📂 코드 가져오기
        uses: actions/checkout@v4

      - name: ⚙️ Node.js 세팅 (버전 20 사용)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 크롤러 전용 라이브러리만 핀셋 설치
        run: |
          npm install @supabase/supabase-js playwright --no-save
          npx playwright install --with-deps chromium

      - name: 🚀 크롤러 실행!
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: node scripts/scraper.mjs