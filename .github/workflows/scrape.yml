name: KBO Data Auto Update

# 봇이 언제 실행될지 설정합니다
on:
  schedule:
    # 매일 한국 시간 기준 0시, 18시, 22시에 실행 (UTC 기준 15, 9, 13시)
    - cron: '0 15,9,13 * * *' 
  # 수동으로 원할 때 버튼을 눌러서 실행할 수 있게 해줍니다
  workflow_dispatch: 

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: 📂 코드 가져오기
        uses: actions/checkout@v3

      - name: ⚙️ Node.js 세팅
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: 📦 라이브러리 설치
        run: |
          npm install
          npx playwright install --with-deps chromium

      - name: 🚀 크롤러 실행!
        env:
          # 여기서 아까 만든 금고(Secrets)의 열쇠를 스크립트에 건네줍니다
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: node scripts/scraper.mjs