name: KBO Data Auto Update

on:
  schedule:
    # 한국 시간(KST) 기준 스케줄을 UTC로 변환한 결과입니다.
    # 1. 오전 10시 (UTC 01:00) : 오늘 경기 정보 최종 확인
    # 2. 오후 6시 ~ 11시 (UTC 09:00 ~ 14:00) : 매시간 실시간 점수 업데이트
    # 3. 오전 0시 (UTC 15:00) : 최종 결과 및 순위 마감
    - cron: '0 1,9,10,11,12,13,14,15 * * *'
  workflow_dispatch: 

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: 📂 코드 가져오기
        uses: actions/checkout@v4

      - name: ⚙️ Node.js 세팅 (버전 20 사용)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 크롤러 전용 라이브러리만 핀셋 설치
        run: |
          npm install @supabase/supabase-js playwright --no-save
          npx playwright install --with-deps chromium

      - name: 🚀 크롤러 실행!
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: node scripts/scraper.mjs